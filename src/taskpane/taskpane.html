<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Academic Email Assistant</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
</head>
<body>
  <div id="app">

    <!-- Status Bar -->
    <div id="status-bar" class="status-bar connecting">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none" style="flex-shrink:0">
        <circle cx="10" cy="10" r="10" fill="#0d9488"/>
        <rect x="3.5" y="6" width="13" height="9" rx="1" fill="none" stroke="white" stroke-width="1.2"/>
        <polyline points="3.5,6 10,11.5 16.5,6" fill="none" stroke="white" stroke-width="1.2"/>
      </svg>
      <span class="status-dot"></span>
      <span id="status-text">Connecting...</span>
      <span id="version-label" style="margin-left:auto;font-size:10px;opacity:0.45">v1.0.0</span>
      <button id="settings-btn" class="icon-btn" title="Settings">&#9881;</button>
    </div>

    <!-- Email Header -->
    <div id="email-header" class="email-header">
      <div id="email-placeholder" class="email-placeholder">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
          <polyline points="22,6 12,13 2,6"/>
        </svg>
        <span>Select an email to get started</span>
      </div>
      <div id="email-info" style="display:none">
        <div id="email-subject" class="email-subject"></div>
        <div id="email-from" class="email-from"></div>
        <div id="email-date" class="email-date"></div>
      </div>
    </div>

    <!-- Chat Area -->
    <div id="chat-wrap" class="chat-wrap">
      <div id="chat-messages" class="chat-messages">
        <div class="message sys-msg">
          <div class="msg-body">
            Welcome to <strong>Academic Email Assistant</strong>. Open an email and ask a question or click Draft Reply.
          </div>
        </div>
      </div>
      <div id="typing-indicator" class="typing-indicator" style="display:none">
        <div class="typing-dots"><span></span><span></span><span></span></div>
        <span id="typing-label" class="typing-label">Thinking...</span>
      </div>
    </div>

    <!-- Input Area -->
    <div class="input-area">
      <!-- Text Input -->
      <div class="input-row">
        <textarea
          id="msg-input"
          class="msg-input"
          placeholder="Ask about this email..."
          rows="1"
        ></textarea>
        <button id="send-btn" class="btn btn-send" title="Send">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor">
            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
          </svg>
        </button>
      </div>
      <!-- Draft Actions -->
      <div class="action-row">
        <button id="draft-btn" class="btn btn-action btn-draft">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
          </svg>
          Draft Reply
        </button>
        <button id="use-draft-btn" class="btn btn-action btn-use-draft" disabled>
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
          Use Draft
        </button>
      </div>
      <!-- Label Row -->
      <div class="label-row" id="label-row" style="display:none">
        <span class="label-title">Label:</span>
        <button class="btn btn-label" data-category="Urgent">🔴 Urgent</button>
        <button class="btn btn-label" data-category="Extension">🟡 Extension</button>
        <button class="btn btn-label" data-category="Info">🔵 Info</button>
        <button class="btn btn-label" data-category="Done">🟢 Done</button>
      </div>
    </div>

  </div>
</body>
</html>
